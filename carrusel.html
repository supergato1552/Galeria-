<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Kaisen - Premium Carousel</title>
    <link rel="stylesheet" href="carrusel.css">
</head>
<body>

    <div class="main-wrapper">
        <header class="apple-header">
            <h1>Galería Premium</h1>
            <p>Jujutsu Kaisen - 6 Momentos Clave</p>
        </header>

        <div class="carousel-container">
            
            <button id="play-pause-btn" class="play-pause-btn" aria-label="Reproducir Automático">▶ Auto</button>

            <div class="carousel-slide">
                <div class="carousel-item">
                    <img src="https://4kwallpapers.com/images/wallpapers/jujutsu-kaisen-3840x2160-9278.jpg" alt="Gojo Satoru Hollow Purple">
                    <div class="carousel-caption">Satoru Gojo: Hollow Purple</div>
                </div>
                <div class="carousel-item">
                    <img src="https://images2.alphacoders.com/135/thumb-1920-1356991.jpeg" alt="Jujutsu Kaisen Elenco Principal">
                    <div class="carousel-caption">Elenco Principal</div>
                </div>
                <div class="carousel-item">
                    <img src="https://images5.alphacoders.com/111/thumb-1920-1116284.jpg" alt="Yuji Itadori Sukuna Dual Form">
                    <div class="carousel-caption">Yuji y Sukuna</div>
                </div>
                <div class="carousel-item">
                    <img src="https://i.ytimg.com/vi/Hvy5eRSx2xY/maxresdefault.jpg" alt="Gojo Domain Expansion Void">
                    <div class="carousel-caption">Expansión de Dominio: Void</div>
                </div>
                <div class="carousel-item">
                    <img src="https://static0.srcdn.com/wordpress/wp-content/uploads/2024/04/nobara-kugisaki-about-to-use-black-flash.jpg" alt="Nobara Kugisaki Black Flash">
                    <div class="carousel-caption">Nobara Kugisaki: Black Flash</div>
                </div>
                <div class="carousel-item">
                    <img src="https://static.wikia.nocookie.net/jujutsu-kaisen/images/c/ca/Cursed_Naoya_zooms_past_Maki_and_Noritoshi.png/revision/latest?cb=20230423003616" alt="Maki Zenin Combat Action">
                    <div class="carousel-caption">Maki Zenin: Combate</div>
                </div>
            </div>

            <button class="prev-btn" aria-label="Anterior">&#10094;</button>
            <button class="next-btn" aria-label="Siguiente">&#10095;</button>

            <div class="carousel-dots">
                <span class="dot active" data-index="0"></span>
                <span class="dot" data-index="1"></span>
                <span class="dot" data-index="2"></span>
                <span class="dot" data-index="3"></span>
                <span class="dot" data-index="4"></span>
                <span class="dot" data-index="5"></span>
            </div>
        </div>
    </div>

    <script src="carrusel.js"></script>
</body>
</html>
